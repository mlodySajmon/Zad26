<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <script>
        let tab1 = [7, 3, 1, 6, 9, 5, 4, 10, 2, 2];
        console.log(tab1[4]);
        tab1[6] = 12;

        let tab2 = new Array(tab1.length);
        for(let i = 0; i < tab1.length; i++) tab2[i] = tab1[i];

        let tab3 = new Array(tab1.length);
        for(let i = 0; i < tab1.length; i++) tab3[i] = tab1[i] + tab2[i];

        for(let i = 0; i < tab1.length; i++) tab2[i] = tab1[tab1.length - 1 - i];

        let n = parseInt(prompt("Podaj wielkość tablicy:"));
        let uTab = [];
        for(let i = 0; i < n; i++) uTab.push(Number(prompt("Podaj liczbę:")));

        console.log(Math.min(...uTab));
        console.log(Math.max(...uTab));
        console.log(uTab.reduce((a, b) => a + b, 0) / uTab.length);
        console.log(uTab.filter(x => x === 3).length);

        let sorted = [...uTab].sort((a, b) => a - b);
        let mid = Math.floor(sorted.length / 2);
        console.log(sorted.length % 2 !== 0 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2);
        console.log(sorted.slice(0, 3));
        console.log(sorted.slice(-3));

        let squared = uTab.map(x => x * x);
        console.log(uTab.filter(x => x % 2 === 0).length);
        console.log(uTab.filter(x => x % 2 !== 0).length);
        console.log(uTab.filter(x => x % 3 === 0).length);

        let word = prompt("Podaj słowo (10 liter):").substring(0, 10);
        let charTab = word.split('');
        console.log(charTab.map(c => c === c.toUpperCase() ? c.toLowerCase() : c.toUpperCase()).join(''));
        console.log([...charTab].sort(() => Math.random() - 0.5));

        let randTab = Array.from({length: 100}, () => Math.floor(Math.random() * 100));
        let gMax = Math.max(...randTab);
        console.log(gMax, randTab.filter(x => x === gMax).length);
        console.log(randTab.filter(x => x % 2 !== 0));
        console.log(randTab.filter((_, i) => i % 2 !== 0));
        console.log(randTab.filter(x => x >= 5 && x < 15));

        let a = Number(prompt("Podaj a:"));
        console.log(randTab.reduce((prev, curr) => Math.abs(curr - a) < Math.abs(prev - a) ? curr : prev));

        let mIdx = randTab.indexOf(Math.min(...randTab));
        console.log(mIdx > 0 ? randTab[mIdx - 1] : "brak");
        console.log(mIdx < 99 ? randTab[mIdx + 1] : "brak");

        let tabGT10 = randTab.filter(x => x > 10);
        
        let tabB = [];
        let s = 0;
        for(let x of randTab) { s += x; tabB.push(s); }

        console.log([...randTab].sort((a, b) => b - a));
        console.log([...new Set(randTab)].filter(x => randTab.filter(y => y === x).length >= 3));

        let fib = [0, 1];
        for(let i = 2; i < 100; i++) fib[i] = fib[i-1] + fib[i-2];

        let p2 = Array.from({length: 100}, (_, i) => Math.pow(2, i));
        let c3n = Array.from({length: 100}, (_, i) => (i + 1) * 3);
        let c2n = Array.from({length: 100}, (_, i) => Math.pow(2, i + 1));
    </script>
</body>
</html>
